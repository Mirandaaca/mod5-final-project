name: 🚂 Deploy Backend → Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-railway.yml'

jobs:
  test-and-deploy:
    name: Test & Deploy Backend a Railway
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: 🧪 Correr unit tests
        working-directory: backend
        run: npm test

      - name: 🚂 Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy a Railway
        working-directory: backend
        run: railway up --service ${{ vars.RAILWAY_SERVICE_NAME }} --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
